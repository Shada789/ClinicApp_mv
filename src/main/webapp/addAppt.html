    <header class="nave">

        <h1>Agendar Cita</h1>
    </header>
    <main id="genDoc2">

        <section>
            <article >
                <form id="formCita" action="addAppt.jsp" method="post">
<label for="paciente">Paciente:</label>
<select id="paciente" name="paciente" required>
    <%
    Connection con = DriverManager.getConnection(
        "jdbc:mysql://localhost:3306/chambs?useSSL=false&serverTimezone=UTC",
        "root", "n0m3l0"
    );
    PreparedStatement psPac = con.prepareStatement(
        "SELECT p.id_paciente, u.nombre, u.paterno, u.materno " +
        "FROM paciente p JOIN usuario u ON p.id_usuario = u.id_usuario " +
        "WHERE p.id_medico = ?"
    );
    psPac.setInt(1, (Integer)session.getAttribute("idMedico"));
    ResultSet rsPac = psPac.executeQuery();
    while(rsPac.next()){
    %>
        <option value="<%= rsPac.getInt("id_paciente") %>">
            <%= rsPac.getString("nombre") %> <%= rsPac.getString("paterno") %> <%= rsPac.getString("materno") %>
        </option>
    <%
    }
    rsPac.close();
    psPac.close();
    con.close();
    %>
</select>

                        <label for="fecha">Fecha de la cita:</label>
                        <input type="date" id="fecha" name="fecha" required><br>


                        <label for="hora">Hora de la cita:</label>
                        <input type="time" id="hora" name="hora" required><br><br>

                        <label for="tipo">Tipo de cita:</label>
                        <select id="tipo" name="tipo" required>
                            <option value="">Selecciona tipo</option>
                            <option value="consulta">Consulta</option>
                            <option value="control">Control</option>
                            <option value="urgencia">Urgencia</option>
                        </select><br><br>

                        <label for="descripcion">Descripción de la cita:</label><br>
                        <textarea id="descripcion" name="descripcion" placeholder="Escribe aquí de qué tratará la cita" required></textarea><br><br>
                   
                    <button type="submit" class="botonImportante">Agregar Cita</button>
                </form>
