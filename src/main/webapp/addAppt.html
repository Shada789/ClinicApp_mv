    <header class="nave">
        <img class="logo" src="imgs/image.png" alt="Logo">

        <h1>Agendar Cita</h1>
    </header>
    <main id="genDoc2">

        <section>
            <article >
                <form id="formCita" action="addAppt.jsp" method="post">

                        <label for="paciente">Paciente:</label>
                        <select id="paciente" name="paciente" required>
                            <option value="">Selecciona paciente</option>
                            <%
                                Connection conn = null;
                                PreparedStatement ps = null;
                                ResultSet rsPac = null;

                                try {
                                    Class.forName("com.mysql.cj.jdbc.Driver");
                                    conn = DriverManager.getConnection(
                                        "jdbc:mysql://localhost:3306/chambs?useSSL=false&serverTimezone=UTC",
                                        "root",
                                        "n0m3l0"
                                    );
                                    ps = conn.prepareStatement(
                                        "SELECT p.id_paciente, u.nombre, u.paterno, u.materno " +
                                        "FROM paciente p " +
                                        "JOIN usuario u ON p.id_usuario = u.id_usuario"
                                    );
                                    rsPac = ps.executeQuery();

                                    while (rsPac.next()) {
                                        int idPaciente = rsPac.getInt("id_paciente");
                                        String nombreCompleto = rsPac.getString("nombre") + " " +
                                                                rsPac.getString("paterno") + " " +
                                                                rsPac.getString("materno");
                            %>
                                        <option value="<%= idPaciente %>"><%= nombreCompleto %></option>
                            <%
                                    }
                                } catch (Exception e) {
                                    out.println("<option>No se han podido cargar los pacientes</option>");
                                } finally {
                                    if (rsPac != null) rsPac.close();
                                    if (ps != null) ps.close();
                                    if (conn != null) conn.close();
                                }
                            %>
                        </select>


                        <label for="fecha">Fecha de la cita:</label>
                        <input type="date" id="fecha" name="fecha" required><br>


                        <label for="hora">Hora de la cita:</label>
                        <input type="time" id="hora" name="hora" required><br><br>


                        <label for="descripcion">Descripción de la cita:</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Escribe aquí de qué tratará la cita" required></textarea><br><br>
                   
                    <button type="submit" class="botonImportante">Agregar Cita</button>
                </form>
                <button type="button" onclick="location.href='docAppts.html'" class="boton">Regresar</button>

            </article>
