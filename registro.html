<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="clinictyle.css" type="text/css">
    <title>Registro de Doctor</title>
</head>

<body id="bodDoc">
    <header>
        <h1>Registro</h1>
    </header>

    <main id="indMain">
        <section>
            <h2>Cree su cuenta</h2>
            <article id="registroDoctor">
                <form id="formRegistroDoctor" class="two-columns" action="registroDoctor.jsp" method="post">

    <div class="field">
        <label for="name"><b>Nombres:</b></label>
        <input type="text" id="name" name="nombre" placeholder="Ingrese sus Nombres" required>
    </div>

    <div class="field">
        <label for="paterno"><b>Apellido Paterno:</b></label>
        <input type="text" id="paterno" name="apellidoP" placeholder="Ingrese su Apellido Paterno" required>
    </div>

    <div class="field">
        <label for="materno"><b>Apellido Materno:</b></label>
        <input type="text" id="materno" name="apellidoM" placeholder="Ingrese su Apellido Materno" required>
    </div>

    <div class="field">
        <label for="correo"><b>Correo Electrónico:</b></label>
        <input type="email" id="correo" name="correo" placeholder="Ingrese su Correo Electrónico" required>
    </div>

    <div class="field">
        <label for="cedula"><b>Cédula Profesional:</b></label>
        <input type="text" id="cedula" name="cedula" placeholder="Ingrese su Cédula Médica" required>
    </div>

    <div class="field">
        <label for="usuario"><b>Usuario:</b></label>
        <input type="text" id="usuario" name="usuario" placeholder="Genere un usuario" required>
    </div>

    <div class="field">
        <label for="contrasenia"><b>Contraseña:</b></label>
        <input type="password" id="contrasenia" name="contrasenia" placeholder="Genere su contraseña" required>
    </div>

    <div class="field">
        <label for="confirm"><b>Confirmar contraseña:</b></label>
        <input type="password" id="confirm" name="confirmar" placeholder="Confirme su contraseña" required>
    </div>

    <button type="submit">Registrarse</button>
</form>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 ClinicApp | Todos los derechos reservados</p>
    </footer>
</body>

</html>
