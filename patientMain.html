<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="clinictyle.css" type="text/css">

</head>

<body id="bodDoc">
    <nav id="navDoc">
        <ul>
            <li><a href="patientMain.html">
                    <img src="imgs/Codementor--Streamline-Simple-Icons.svg">
                    <span> Inicio</span></a></li>
            <li><a href="patientHistory.html">
                    <img src="imgs/clinic-history-folder-with-plus-sign-svgrepo-com.svg">
                    <span>Historial</span></a></li>
            <li><a href="patientAppts.html">
                    <img src="imgs/calendar-symbol-svgrepo-com.svg">
                    <span>Citas</span></a></li>
            <li><a href="patientTreatment.html">
                    <img src="imgs/tooth-with-mouthwash-svgrepo-com.svg">
                    <span>Tratamientos</span>
                </a></li>
            <li><a href="patientMyProfile.html">
                    <img src="imgs/profile-1341-svgrepo-com.svg">
                    <span>Perfil</span>
                </a></li>
        </ul>
    </nav>

    <main id="genDoc2">
        <header>
            <h1>ClinicApp</h1>
        </header>

        <section>
            <p>Bienvenido(a), [Nombre]!</p>
        </section>

        <section id="tablasDia">
            <article>
                <h2>Mis Citas</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Motivo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0</td>
                            <td>0</td>
                        </tr>
                    </tbody>
                </table>
            </article>

            <article>
                <h2>Mis Tratamientos</h2>
                <table id="tablaTratamientos">
                    <thead>
                        <tr>
                            <th>Tratamiento</th>
                            <th>Estado</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0</td>
                            <td>0</td>
                            <td>0</td>
                        </tr>
                    </tbody>
                </table>
            </article>

            <aside id="reloj">
                <h3>Fecha y Hora</h3>
                <p id="hora">[HORA]</p>
                <p id="fecha">[FECHA]</p><br>

            </aside>
        </section>

        <footer>
            <p>&copy; 2025 ClinicApp | Todos los derechos reservados</p>
        </footer>
    </main>
    <script>
        function actualizarReloj() {
            const ahora = new Date();

            const opcionesHora = { hour: '2-digit', minute: '2-digit', hour12: true };
            const horaFormateada = ahora.toLocaleTimeString('es-ES', opcionesHora);

            const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const fechaFormateada = ahora.toLocaleDateString('es-ES', opcionesFecha);

            // Actualizar elementos
            document.getElementById('hora').textContent = horaFormateada;
            document.getElementById('fecha').textContent = fechaFormateada;
        }
        actualizarReloj();
        setInterval(actualizarReloj, 1000);
    </script>
</body>

</html>
