    <header class="nave">
        <img class="logo" src="imgs/image.png" alt="Logo">

        <h1>Agendar Cita</h1>
    </header>
    <main id="genDoc2">

        <section>
            <article >
                <form id="formCita" action="addAppt.jsp" method="post">

                        <label for="paciente">Paciente:</label>
                        <input type="text" id="paciente" name="paciente" placeholder="Nombre del paciente" required><br><br>


                        <label for="fecha">Fecha de la cita:</label>
                        <input type="date" id="fecha" name="fecha" required><br>


                        <label for="hora">Hora de la cita:</label>
                        <input type="time" id="hora" name="hora" required><br><br>


                        <label for="tipo">Tipo de cita:</label>
                        <select id="tipo" name="tipo" required>
                            <option value="">Selecciona tipo</option>
                            <option value="consulta">Consulta</option>
                            <option value="control">Control</option>
                            <option value="urgencia">Urgencia</option>
                        </select><br><br>
                   
                    <button type="submit" class="botonImportante">Agregar Cita</button>
                </form>
                <button type="button" onclick="location.href='docAppts.html'" class="boton">Regresar</button>

            </article>

            <table id="tablasDia">
                <thead>
                    <tr>
                        <th>Doctor</th>
                        <th>Paciente</th>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
